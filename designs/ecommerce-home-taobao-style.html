<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>电商首页 · 淘宝风格参考</title>
  <style>
    :root {
      --brand: #ff5000;
      --brand-soft: #ff7a45;
      --bg: #f4f4f4;
      --card: #ffffff;
      --text: #111111;
      --muted: #666666;
      --weak: #999999;
      --line: #e5e5e5;
      --radius-search: 18px;
      --radius-card: 8px;
      --w: 375px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px 0 32px;
    }
    .phone {
      width: var(--w);
      background: var(--bg);
      min-height: 812px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,.35);
    }
    /* 顶栏 */
    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      background: linear-gradient(180deg, #ffe8e0 0%, var(--bg) 100%);
    }
    .loc {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .search {
      flex: 1;
      height: 36px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-search);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      font-size: 13px;
      color: var(--weak);
    }
    .search::before {
      content: "⌕";
      font-size: 16px;
      opacity: .5;
    }
    .icon-btn {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      font-size: 18px;
      opacity: .85;
    }
    /* 金刚区 */
    .quick {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px 4px;
      padding: 12px 8px 16px;
      background: var(--card);
      margin: 0 8px;
      border-radius: var(--radius-card);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .quick-item {
      text-align: center;
    }
    .quick-ico {
      width: 48px;
      height: 48px;
      margin: 0 auto 6px;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff5f0, #ffe0d5);
      border: 1px solid #ffd4c4;
    }
    .quick-item span {
      font-size: 11px;
      color: var(--text);
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* Banner */
    .banner-wrap { padding: 0 8px 12px; }
    .banner {
      height: 148px;
      border-radius: var(--radius-card);
      background: linear-gradient(125deg, var(--brand) 0%, var(--brand-soft) 50%, #ffb088 100%);
      color: #fff;
      padding: 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .banner::after {
      content: "";
      position: absolute;
      right: -20px;
      bottom: -30px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,.12);
      border-radius: 50%;
    }
    .banner h2 { font-size: 22px; font-weight: 700; letter-spacing: .02em; }
    .banner p { font-size: 12px; opacity: .95; margin-top: 6px; }
    .banner .tag {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      background: rgba(255,255,255,.25);
      border-radius: 4px;
      font-size: 11px;
    }
    /* 横向券 */
    .h-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 8px 12px;
      scrollbar-width: none;
    }
    .h-scroll::-webkit-scrollbar { display: none; }
    .coupon {
      flex: 0 0 120px;
      height: 88px;
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 10px;
      border: 1px solid #f0f0f0;
    }
    .coupon strong { font-size: 16px; color: var(--brand); }
    .coupon small { display: block; font-size: 11px; color: var(--muted); margin-top: 4px; }
    /* Feed */
    .feed-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 8px 0 12px;
      font-size: 14px;
    }
    .feed-head .on {
      color: var(--text);
      font-weight: 600;
      position: relative;
    }
    .feed-head .on::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--brand);
      border-radius: 2px;
    }
    .feed-head .off { color: var(--weak); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 8px 80px;
    }
    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
    }
    .card-img {
      aspect-ratio: 1;
      background: linear-gradient(160deg, #e8e8e8, #f8f8f8);
    }
    .card-body { padding: 8px; }
    .card-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.35;
      height: 2.7em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .price-row {
      margin-top: 8px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .price { font-size: 16px; font-weight: 700; color: var(--brand); }
    .price small { font-size: 11px; font-weight: 500; }
    .badge {
      font-size: 10px;
      color: var(--brand);
      border: 1px solid rgba(255,80,0,.35);
      padding: 0 4px;
      border-radius: 2px;
    }
    /* 底栏 */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: var(--w);
      max-width: 100%;
      height: 56px;
      background: var(--card);
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      align-items: center;
      font-size: 10px;
      color: var(--weak);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tabbar .item { text-align: center; }
    .tabbar .item.on { color: var(--brand); font-weight: 600; }
    .tabbar .dot {
      width: 22px;
      height: 22px;
      margin: 0 auto 2px;
      border-radius: 6px;
      background: #eee;
    }
    .tabbar .item.on .dot { background: var(--brand); opacity: .9; }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <div class="loc">杭州 ▾</div>
      <div class="search">搜索宝贝、店铺</div>
      <div class="icon-btn" title="相机">📷</div>
      <div class="icon-btn" title="购物车">🛒</div>
    </header>

    <nav class="quick" aria-label="快捷入口">
      <div class="quick-item"><div class="quick-ico"></div><span>天猫</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>聚划算</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>充值</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>飞猪</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>外卖</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>分类</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>拍卖</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>超市</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>国补</span></div>
      <div class="quick-item"><div class="quick-ico"></div><span>更多</span></div>
    </nav>

    <div class="banner-wrap">
      <div class="banner">
        <h2>年货节</h2>
        <p>好价提前囤 · 每满300减40</p>
        <span class="tag">领券中心 ›</span>
      </div>
    </div>

    <div class="h-scroll">
      <div class="coupon"><strong>¥50</strong><small>满399可用</small></div>
      <div class="coupon"><strong>9折</strong><small>限品类券</small></div>
      <div class="coupon"><strong>免邮</strong><small>店铺新客</small></div>
      <div class="coupon"><strong>¥20</strong><small>无门槛</small></div>
    </div>

    <div class="feed-head">
      <span class="on">猜你喜欢</span>
      <span class="off">精选</span>
    </div>

    <div class="grid">
      <article class="card">
        <div class="card-img" aria-hidden="true"></div>
        <div class="card-body">
          <div class="card-title">冬季加厚保暖棉衣外套男款休闲连帽短款</div>
          <div class="price-row">
            <span class="price"><small>¥</small>168</span>
            <span class="badge">券后价</span>
          </div>
        </div>
      </article>
      <article class="card">
        <div class="card-img" aria-hidden="true"></div>
        <div class="card-body">
          <div class="card-title">坚果礼盒大礼包每日坚果混合装送礼年货</div>
          <div class="price-row">
            <span class="price"><small>¥</small>89</span>
            <span class="badge">热卖</span>
          </div>
        </div>
      </article>
      <article class="card">
        <div class="card-img" aria-hidden="true"></div>
        <div class="card-body">
          <div class="card-title">无线蓝牙耳机降噪长续航适用多机型</div>
          <div class="price-row">
            <span class="price"><small>¥</small>199</span>
            <span class="badge">券后价</span>
          </div>
        </div>
      </article>
      <article class="card">
        <div class="card-img" aria-hidden="true"></div>
        <div class="card-body">
          <div class="card-title">洗衣液家庭装除菌除螨持久留香大容量</div>
          <div class="price-row">
            <span class="price"><small>¥</small>39.9</span>
          </div>
        </div>
      </article>
    </div>
  </div>

  <nav class="tabbar" aria-label="主导航">
    <div class="item on"><div class="dot"></div>首页</div>
    <div class="item"><div class="dot"></div>逛逛</div>
    <div class="item"><div class="dot"></div>消息</div>
    <div class="item"><div class="dot"></div>购物车</div>
    <div class="item"><div class="dot"></div>我的</div>
  </nav>
</body>
</html>
