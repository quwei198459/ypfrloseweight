spring:
  application:
    name: loseweight-api
  profiles:
    active: local
  codec:
    max-in-memory-size: 16MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/loseweight?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: change-me

server:
  port: 8080
  # 显式监听所有网卡，便于真机通过局域网 IP 访问（模拟器用 127.0.0.1 即可）
  address: 0.0.0.0
  tomcat:
    max-http-form-post-size: 20MB
    max-swallow-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# 密码、AppSecret、AppCode 请在 application-local.yml 或环境变量中覆盖（application-local.yml 已加入 .gitignore）

wechat:
  miniapp:
    app-id: ${WECHAT_MINIAPP_APP_ID:wxfd93d8228139adca}
    app-secret: ${WECHAT_MINIAPP_APP_SECRET:change-me}

aliyun:
  food:
    host: https://jmfdcl.market.alicloudapi.com
    path: /food/calories/query
    appcode: ${ALIYUN_FOOD_APPCODE:change-me}

# JWT 签发（secret 必须在 application-local.yml 或环境变量中覆盖为≥32字节的随机串）
app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-only-change-in-application-local-yml-min-32-chars!!}
    expire-seconds: 604800
  upload:
    avatar-dir: ./uploads/avatars
    food-image-dir: ./uploads/food-images

logging:
  level:
    com.ypfr.loseweight.mapper: debug
