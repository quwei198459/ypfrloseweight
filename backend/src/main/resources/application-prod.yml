server:
  port: 8081
  address: 127.0.0.1

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/loseweight?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-to-at-least-32-bytes-secret}
    expire-seconds: 604800

logging:
  level:
    root: info
